services:
  api:
    build: ./api
    image: ipadecrypt-service
    container_name: ipadecrypt-service
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      PORT: 8080
      BIND_HOST: 127.0.0.1
    volumes:
      - ipadecrypt-config:/root/.ipadecrypt
      - ipa-tmp:/data/tmp
      - ipadecrypt-state:/data/state
      - ${HOME}/.ssh/id_ed25519_ipad:/root/.ssh/id_ed25519:ro

volumes:
  ipadecrypt-config:
  ipa-tmp:
  ipadecrypt-state:
