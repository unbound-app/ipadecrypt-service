name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run typecheck:web
      - run: bun run build:web

  deploy:
    name: Deploy to homelab
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, homelab]
    timeout-minutes: 15
    concurrency:
      group: deploy-homelab
      cancel-in-progress: false
    steps:
      - name: Pull and rebuild
        run: |
          set -e
          git config --global --add safe.directory /home/adrian/ipadecrypt-service
          cd /home/adrian/ipadecrypt-service
          git fetch origin main
          git merge --ff-only origin/main
          docker tag ipadecrypt-service:latest ipadecrypt-service:previous 2>/dev/null || true
          docker compose build api
          docker compose up -d api

      - name: Wait for health, roll back on failure
        run: |
          set -e
          for i in $(seq 1 15); do
            if curl -sf -o /dev/null http://127.0.0.1:8080/; then
              echo "healthy"
              exit 0
            fi
            sleep 2
          done

          echo "service did not become healthy in time" >&2
          docker compose -f /home/adrian/ipadecrypt-service/docker-compose.yml logs --tail 50 api

          if docker image inspect ipadecrypt-service:previous >/dev/null 2>&1; then
            echo "rolling back to the previous image" >&2
            docker tag ipadecrypt-service:previous ipadecrypt-service:latest
            docker compose -f /home/adrian/ipadecrypt-service/docker-compose.yml up -d api
          else
            echo "no previous image to roll back to" >&2
          fi
          exit 1
